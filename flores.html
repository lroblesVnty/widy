<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flores Amarillas Floreciendo (sin suelo verde)</title>
  <style>
    :root{
      /* Fondo nuevo: cielo + atardecer + bokeh (sin suelo verde) */
      --bg1:#0f172a;   /* azul noche */
      --bg2:#1d4ed8;   /* azul */
      --bg3:#fb7185;   /* rosa */
      --bg4:#fde68a;   /* amarillo suave */

      /* Flores */
      --stem:#2f7a3d;
      --leaf:#2fb956;

      --petal1:#ffe067;
      --petal2:#ffbe2f;
      --center1:#f2d57f;
      --center2:#b06a1d;
      --center3:#6b3a10;

      --shadow: rgba(0,0,0,.18);
      --glass: rgba(255,255,255,.08);
      --glass2: rgba(255,255,255,.14);
    }

    *{ box-sizing:border-box; }
    
html, body{
  width: 100%;
  overflow-x: hidden;
}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow:hidden;
      user-select:none;

      /* Fondo “premium” sin franja verde */
      background:
        radial-gradient(1000px 700px at 15% 20%, rgba(253,230,138,.55), transparent 60%),
        radial-gradient(900px 650px at 80% 30%, rgba(251,113,133,.42), transparent 62%),
        radial-gradient(900px 700px at 55% 92%, rgba(29,78,216,.35), transparent 60%),
        linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 42%, var(--bg3) 72%, var(--bg4) 110%);
    }

    /* “Bokeh” (lucecitas) */
    .bokeh{
      position:fixed;
      inset:-20%;
      pointer-events:none;
      opacity:.75;
      filter: blur(.2px);
      background:
        radial-gradient(circle at 12% 24%, rgba(255,255,255,.18) 0 18px, transparent 19px),
        radial-gradient(circle at 25% 70%, rgba(255,255,255,.12) 0 26px, transparent 27px),
        radial-gradient(circle at 48% 34%, rgba(255,255,255,.12) 0 14px, transparent 15px),
        radial-gradient(circle at 62% 78%, rgba(255,255,255,.10) 0 22px, transparent 23px),
        radial-gradient(circle at 78% 22%, rgba(255,255,255,.15) 0 18px, transparent 19px),
        radial-gradient(circle at 88% 64%, rgba(255,255,255,.10) 0 30px, transparent 31px);
      animation: floaty 9s ease-in-out infinite;
    }
    @keyframes floaty{
      0%,100%{ transform: translate3d(0,0,0) scale(1); opacity:.7; }
      50%{ transform: translate3d(-1.5vmin, 1.2vmin, 0) scale(1.02); opacity:.85; }
    }

    /* Sol/luz suave (no “suelo”) */
    .glow{
      position:fixed;
      top: 7vmin;
      right: 7vmin;
      width: 18vmin;
      aspect-ratio:1;
      border-radius:50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.85) 0 18%, rgba(253,230,138,.75) 30%, rgba(251,113,133,.35) 60%, transparent 75%);
      filter: blur(.2px) drop-shadow(0 18px 24px rgba(0,0,0,.15));
      animation: pulse 3.2s ease-in-out infinite;
      opacity:.9;
      pointer-events:none;
    }
    @keyframes pulse{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.08); }
    }

    /* Tarjeta/escenario tipo vidrio */
    .scene{
      
        width: min(980px, 94vw);
        height: min(600px, 78svh);

      position:relative;
      display:flex;
      align-items:flex-end;
      justify-content:space-evenly;
      gap: clamp(12px, 4vw, 46px);
      padding: 5vmin 3vmin 8vmin;
      border-radius: 28px;
      background: linear-gradient(180deg, var(--glass), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 30px 70px rgba(0,0,0,.25);
      backdrop-filter: blur(10px);
    }

    /* Sombra inferior (para “apoyar” sin suelo verde) */
    .scene::after{
      content:"";
      position:absolute;
      left: 10%;
      right: 10%;
      bottom: 2.4vmin;
      height: 22px;
      border-radius: 999px;
      background: rgba(0,0,0,.18);
      filter: blur(10px);
      opacity:.55;
      pointer-events:none;
    }

    /* --- Flor --- */
    .flower{
      position:relative;
      width: clamp(120px, 18vmin, 190px);
      height: clamp(340px, 52vmin, 490px);
      filter: drop-shadow(0 18px 14px var(--shadow));
      transform-origin: 50% 100%;
      animation: sway 4.8s ease-in-out infinite;
    }
    .flower:nth-child(2){ animation-delay:-1.2s; }
    .flower:nth-child(3){ animation-delay:-2.1s; }
    .flower:nth-child(4){ animation-delay:-3.0s; }

    @keyframes sway{
      0%,100%{ transform: rotate(-1.2deg); }
      50%{ transform: rotate(1.6deg); }
    }

    /* base sombra individual (sustituye “suelo”) */
    .base{
      position:absolute;
      left:50%;
      bottom: 2.6vmin;
      width: 120px;
      height: 18px;
      transform: translateX(-50%) scaleX(.35);
      border-radius:999px;
      background: rgba(0,0,0,.22);
      filter: blur(1px);
      opacity:0;
    }

    .stem{
      position:absolute;
      left:50%;
      bottom: 3.4vmin;
      width: 12px;
      height: 74%;
      transform: translateX(-50%) scaleY(0);
      transform-origin: 50% 100%;
      border-radius:999px;
      background: linear-gradient(180deg, #41b45b, var(--stem));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
    }

    .leaf{
      position:absolute;
      width: 46px;
      height: 26px;
      background: radial-gradient(circle at 30% 30%, #64ff9a, var(--leaf) 68%);
      border-radius: 100% 0 100% 0;
      opacity:0;
      transform: scale(.2) rotate(0deg);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.10);
    }
    .leaf.l1{
      left: 56%;
      bottom: 46%;
      transform-origin: 0% 80%;
      transform: scale(.2) rotate(-25deg);
    }
    .leaf.l2{
      left: 14%;
      bottom: 36%;
      border-radius: 0 100% 0 100%;
      transform-origin: 100% 80%;
      transform: scale(.2) rotate(25deg);
    }

    .head{
      position:absolute;
      left:50%;
      top: 8%;
      width: 152px;
      aspect-ratio:1;
      transform: translateX(-50%) scale(.06);
      transform-origin: 50% 70%;
      opacity:0;
      display:grid;
      place-items:center;
    }

    
    /* Pétalos detrás */
    .petals{
    position:absolute;
    inset:0;
    display:grid;
    place-items:center;
    z-index: 1;
    }

    .petal{
      position:absolute;
      width: 44px;
      height: 78px;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 25%, #fff7b9 0 26%, var(--petal1) 48%, var(--petal2) 100%);
      transform-origin: 50% 92%;
      transform: rotate(var(--a)) translateY(10px) scaleY(.25) scaleX(.55);
      filter: drop-shadow(0 4px 3px rgba(0,0,0,.10));
    }

    
    .center{
    position:absolute;
    left:50%;
    top:70%;
    transform: translate(-50%, -50%) scale(.4);
    transform-origin: 50% 50%;
    width: 54px;
    aspect-ratio:1;
    border-radius:50%;
    background: radial-gradient(circle at 35% 35%, var(--center1) 0 18%, var(--center2) 45%, var(--center3) 100%);
    box-shadow:
        inset 0 0 0 6px rgba(0,0,0,.10),
        0 12px 14px rgba(0,0,0,.14);
    opacity:0;
    z-index: 2; /* por encima de pétalos */
    }


    .spark{
      position:absolute;
      width: 8px; height:8px;
      border-radius:50%;
      background: rgba(255,255,255,.85);
      top: 12px; left: 16px;
      opacity:0;
      filter: blur(.2px);
    }
    .spark::after{
      content:"";
      position:absolute;
      width: 5px; height:5px;
      border-radius:50%;
      background: rgba(255,255,255,.65);
      top: 18px; left: 20px;
    }

    .petal:nth-child(1) { --a:   0deg; }
    .petal:nth-child(2) { --a:  36deg; }
    .petal:nth-child(3) { --a:  72deg; }
    .petal:nth-child(4) { --a: 108deg; }
    .petal:nth-child(5) { --a: 144deg; }
    .petal:nth-child(6) { --a: 180deg; }
    .petal:nth-child(7) { --a: 216deg; }
    .petal:nth-child(8) { --a: 252deg; }
    .petal:nth-child(9) { --a: 288deg; }
    .petal:nth-child(10){ --a: 324deg; }

    /* ---- Etapas controladas por JS ---- */
    .grow .base{ animation: base-in .7s ease forwards; }
    @keyframes base-in{
      to{ transform: translateX(-50%) scaleX(1); opacity:1; }
    }

    .grow .stem{ animation: grow-stem 1.3s cubic-bezier(.22,1,.36,1) forwards; }
    @keyframes grow-stem{
      to{ transform: translateX(-50%) scaleY(1); }
    }

    .leafs .leaf{ animation: leaf-pop .9s cubic-bezier(.22,1,.36,1) forwards; }
    .leafs .leaf.l1{ animation-delay: .05s; }
    .leafs .leaf.l2{ animation-delay: .12s; }
    @keyframes leaf-pop{
      0%{ opacity:0; }
      70%{ opacity:1; transform: scale(1.06) rotate(var(--r)); }
      100%{ opacity:1; transform: scale(1) rotate(var(--r)); }
    }
    .leaf.l1{ --r:-22deg; }
    .leaf.l2{ --r: 22deg; }

    .bloom .head{ animation: bloom 1.1s cubic-bezier(.14,1.22,.3,1) forwards; }
    @keyframes bloom{
      0%{ opacity:0; transform: translateX(-50%) scale(.06) rotate(-16deg); filter: blur(1px); }
      70%{ opacity:1; transform: translateX(-50%) scale(1.06) rotate(0deg); filter: blur(0); }
      100%{ opacity:1; transform: translateX(-50%) scale(1) rotate(0deg); }
    }

    .open .petal{ animation: open-petal .95s cubic-bezier(.2,1,.25,1) forwards; }
    .open .petal:nth-child(odd){ animation-delay:.06s; }
    .open .petal:nth-child(even){ animation-delay:.12s; }
    .open .petal:nth-child(3n){ animation-delay:.18s; }
    @keyframes open-petal{
      0%{ transform: rotate(var(--a)) translateY(10px) scaleY(.25) scaleX(.55); }
      70%{ transform: rotate(var(--a)) translateY(-6px) scaleY(1.06) scaleX(1); }
      100%{ transform: rotate(var(--a)) translateY(-4px) scaleY(1) scaleX(1); }
    }

   
    /* La entrada del centro debe mantener el translate */
    .open .center{
    animation: center-in .6s ease forwards;
    animation-delay: .22s;
    }
    @keyframes center-in{
    to{ transform: translate(-50%, -50%) scale(1); opacity:1; }
    }


    .alive .petal{
      animation: breathe 2.8s ease-in-out infinite;
      animation-delay: .8s;
    }
    @keyframes breathe{
      0%,100%{ transform: rotate(var(--a)) translateY(-4px) scaleY(1); }
      50%{ transform: rotate(calc(var(--a) + 2deg)) translateY(-6px) scaleY(1.03); }
    }
    .alive .spark{
      animation: sparkle 2.2s ease-in-out infinite;
      animation-delay: 1.2s;
    }
    @keyframes sparkle{
      0%{ transform: translateY(10px) scale(.6); opacity:0; }
      35%{ opacity:.95; }
      60%{ transform: translateY(0) scale(1); opacity:.55; }
      100%{ transform: translateY(-7px) scale(.6); opacity:0; }
    }

    /* Etiqueta */
    .hint{
      position:fixed;
      bottom: 2.2vmin;
      left: 50%;
      transform: translateX(-50%);
      padding: .6rem 1rem;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 22px rgba(0,0,0,.18);
      font-weight: 650;
      color: rgba(255,255,255,.92);
      letter-spacing: .2px;
    }
     .message{
        position: fixed;
        top: 24px;              /* distancia desde arriba */
        left: 50%;
        transform: translateX(-50%);

        padding: 0.9rem 1.6rem;
        font-size: clamp(1.2rem, 2.4vw, 2rem);
        font-weight: 600;
        text-align: center;
        color: #fff;

        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 999px;

        backdrop-filter: blur(10px);
        box-shadow: 0 20px 40px rgba(0,0,0,.25);

        z-index: 2000;
        opacity: 1;
    }


    @media (prefers-reduced-motion: reduce){
      .bokeh, .glow, .flower{ animation:none !important; }
      .stem, .leaf, .head, .base, .petal, .center, .spark{ animation:none !important; transform:none !important; opacity:1 !important; }
    }
   
    
@media (max-width: 640px){

  /* Escena un poco más baja */
  .scene{
    height: 78svh;
    padding-top: 16svh;   /* espacio para el mensaje */
    padding-bottom: 4svh;
  }

  /* 🌼 FLORES MÁS CHICAS */
  .flower{
    width: clamp(90px, 32vw, 130px);
    height: clamp(240px, 46svh, 340px);
  }

  /* Cabeza de la flor más pequeña */
  .head{
    width: clamp(95px, 28vw, 125px);
  }
  
/* Mensaje arriba: más compacto en móvil */
  .message{
    top: 12px;
    width: min(92vw, 520px);
    padding: .75rem 1rem;
    font-size: clamp(1rem, 4.2vw, 1.4rem);
    line-height: 1.2;
  }


  /* Centro café proporcional */
  .center{
    width: clamp(36px, 10vw, 46px);
  }

  /* Pétalos más cortos */
  .petal{
    height: 62px;
    width: 36px;
  }

  /* Tallo más corto */
  .stem{
    height: 65%;
  }
}



  </style>
</head>
<body>
  <div class="bokeh" aria-hidden="true"></div>
  <div class="glow" aria-hidden="true"></div>

  <main class="scene" aria-label="Flores amarillas floreciendo (sin suelo verde)">
    <div class="flower">
      <div class="base"></div>
      <div class="stem"></div>
      <div class="leaf l1"></div>
      <div class="leaf l2"></div>
      <div class="head">
        <div class="petals">
          <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
          <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
        </div>
        <div class="center"><span class="spark"></span></div>
      </div>
    </div>

    <div class="flower">
      <div class="base"></div>
      <div class="stem"></div>
      <div class="leaf l1"></div>
      <div class="leaf l2"></div>
      <div class="head">
        <div class="petals">
          <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
          <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
        </div>
        <div class="center"><span class="spark"></span></div>
      </div>
    </div>

    <div class="flower">
      <div class="base"></div>
      <div class="stem"></div>
      <div class="leaf l1"></div>
      <div class="leaf l2"></div>
      <div class="head">
        <div class="petals">
          <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
          <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
        </div>
        <div class="center"><span class="spark"></span></div>
      </div>
    </div>
  </main>

  <!-- <div class="hint">🌼 Clic para reiniciar la floración</div> -->
   
    <div class="message">
    ❤️ Te quiero Widy❤️
    </div>


  <script>
    const flowers = Array.from(document.querySelectorAll('.flower'));
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    async function bloomOne(flower, delay=0){
      flower.classList.remove('grow','leafs','bloom','open','alive');
      await sleep(delay);

      flower.classList.add('grow');   // base + tallo
      await sleep(850);

      flower.classList.add('leafs');  // hojas
      await sleep(650);

      flower.classList.add('bloom');  // aparece cabeza
      await sleep(520);

      flower.classList.add('open');   // abre pétalos
      await sleep(950);

      flower.classList.add('alive');  // vida/brillo
    }

    function bloomAll(){
      const baseDelay = 140;
      flowers.forEach((f, i) => bloomOne(f, i * baseDelay));
    }

    bloomAll();
    document.addEventListener('click', bloomAll);
    document.addEventListener('visibilitychange', () => { if(!document.hidden) bloomAll(); });
  </script>
</body>
</html>
